name: Docker Build and Push

on:
  push:
    branches: [main]
  pull_request:
    branches: [ "main" ]

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  tag:
    name: Create Release Tag
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.bump.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Determine version bump
        id: bump
        run: |
          LATEST_TAG=$(git tag -l "v*" --sort=-v:refname | head -n 1)

          if [ -z "$LATEST_TAG" ]; then
            echo "new_tag=v0.1.0" >> $GITHUB_OUTPUT
            exit 0
          fi

          VERSION=$(echo "$LATEST_TAG" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          # Analyze commits since last tag
          COMMITS=$(git log "$LATEST_TAG"..HEAD --pretty=format:"%s")

          if [ -z "$COMMITS" ]; then
            echo "No new commits since $LATEST_TAG"
            echo "new_tag=" >> $GITHUB_OUTPUT
            exit 0
          fi

          if echo "$COMMITS" | grep -qE '^[a-z]+!:|BREAKING CHANGE:'; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif echo "$COMMITS" | grep -qE '^feat(\(.+\))?:'; then
            MINOR=$((MINOR + 1))
            PATCH=0
          elif echo "$COMMITS" | grep -qE '^fix(\(.+\))?:'; then
            PATCH=$((PATCH + 1))
          else
            PATCH=$((PATCH + 1))
          fi

          echo "new_tag=v${MAJOR}.${MINOR}.${PATCH}" >> $GITHUB_OUTPUT

      - name: Create and push tag
        if: steps.bump.outputs.new_tag != ''
        run: |
          NEW_TAG=${{ steps.bump.outputs.new_tag }}
          echo "Tagging $NEW_TAG"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"

  build-and-push:
    name: Build and Push Docker Images
    needs: [tag]
    if: always() && (needs.tag.result == 'success' || github.event_name == 'pull_request')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component: [api, frontend, consumer, producer]
        region: [us-east-1, us-east-2]
        include:
          - component: api
            context: ./api
            ecr_repo: api
          - component: frontend
            context: ./frontend
            ecr_repo: frontend
          - component: consumer
            context: ./app
            dockerfile: ./app/Dockerfile.consumer
            ecr_repo: consumer
          - component: producer
            context: ./app
            dockerfile: ./app/Dockerfile.producer
            ecr_repo: producer

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v5.1.1
        with:
          audience: sts.amazonaws.com
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/InfraDeployAccess
          aws-region: ${{ matrix.region }}
          role-session-name: github-actions-ecr-push

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Get Short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short=6 HEAD)" >> $GITHUB_OUTPUT

      - name: Build image tags
        id: tags
        env:
          REGISTRY: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ matrix.region }}.amazonaws.com
          REPO: ${{ matrix.ecr_repo }}
          SHA: ${{ steps.vars.outputs.sha_short }}
          NEW_TAG: ${{ needs.tag.outputs.new_tag }}
        run: |
          TAGS="${REGISTRY}/${REPO}:${SHA}"
          TAGS="${TAGS}
          ${REGISTRY}/${REPO}:latest"
          if [[ -n "$NEW_TAG" ]]; then
            VERSION="${NEW_TAG#v}"
            TAGS="${TAGS}
          ${REGISTRY}/${REPO}:${VERSION}"
          fi
          echo "tags<<EOF" >> $GITHUB_OUTPUT
          echo "$TAGS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build and Push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile || '' }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-helm-values:
    name: Update Helm Image Tags
    needs: [tag, build-and-push]
    if: github.event_name == 'push' && needs.tag.outputs.new_tag != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Update image tags in values files
        env:
          VERSION: ${{ needs.tag.outputs.new_tag }}
        run: |
          TAG="${VERSION#v}"
          for values_file in helm/kafka-lab/env/values-us-east-1.yaml helm/kafka-lab/env/values-us-east-2.yaml; do
            sed -i "s/^\(\s*tag:\s*\).*/\1\"${TAG}\"/" "$values_file"
          done

      - name: Create PR
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.tag.outputs.new_tag }}
        run: |
          TAG="${VERSION#v}"
          BRANCH="chore/update-image-tags-${TAG}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add helm/kafka-lab/env/values-us-east-1.yaml helm/kafka-lab/env/values-us-east-2.yaml
          git commit -m "chore: update image tags to ${TAG}"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore: update image tags to ${TAG}" \
            --body "Automated PR to update Helm values with image tag \`${TAG}\` after successful build and push to ECR."
