# .github/workflows/security.yml
name: Security Analysis

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  schedule:
    - cron: '21 16 * * 4' # Weekly scan

jobs:
  sast:
    name: Static Analysis & SCA
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff bandit pip-audit

      - name: Ruff Linting
        run: ruff check .

      - name: Bandit SAST
        run: bandit -r . -ll

      - name: pip-audit SCA
        run: |
          # Audit each requirements file for known vulnerabilities
          find . -name "requirements.txt" -exec pip-audit -r {} \;

  trivy-config:
    name: Trivy IaC & Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Trivy Config Scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'config'
          hide-progress: false
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Trivy Secret Scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'fs'
          hide-progress: false
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

  trivy-container:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image_name: kafka-lab-app
            context: ./app
          - image_name: kafka-lab-api
            context: ./api
          - image_name: kafka-lab-frontend
            context: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Build Docker Image
        run: docker build -t ${{ matrix.image_name }}:latest ${{ matrix.context }}

      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: '${{ matrix.image_name }}:latest'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
