server {
    listen 8080;

    gzip on;
    gzip_types application/json text/plain text/css application/javascript;
    gzip_min_length 256;

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
