{{- if .Values.externalSecrets.enabled }}
{{- $root := . }}
{{- $components := list "producer" "consumer" "api" }}
{{- $first := true }}
{{- range $name := $components }}
{{- $config := index $root.Values $name }}
{{- if and $config.enabled $config.secretPath }}
{{- if not $first }}
---
{{- end }}
{{- $first = false }}
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: {{ $name }}-secret-store
  labels:
    {{- include "kafka-lab.labels" $root | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
spec:
  provider:
    aws:
      service: SecretsManager
      region: {{ $root.Values.region }}
      auth:
        jwt:
          serviceAccountRef:
            name: {{ $config.serviceAccount.name | default $name }}
{{- end }}
{{- end }}
{{- end }}
