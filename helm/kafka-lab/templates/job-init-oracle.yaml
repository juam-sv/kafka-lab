{{- if and .Values.jobs.enabled .Values.jobs.initOracle.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "kafka-lab.fullname" . }}-init-oracle
  labels:
    {{- include "kafka-lab.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.jobs.initOracle.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: {{ .Values.jobs.ttlSecondsAfterFinished }}
      backoffLimit: {{ .Values.jobs.initOracle.backoffLimit }}
      template:
        spec:
          serviceAccountName: {{ .Values.consumer.serviceAccount.name | default "consumer" }}
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            fsGroup: 1000
          containers:
            - name: init-oracle
              image: {{ .Values.consumer.image.repository }}:{{ .Values.consumer.image.tag }}
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
                - name: pip-cache
                  mountPath: /.local
              command:
                - sh
                - -c
                - |
                  pip install --user oracledb && python << 'PYEOF'
                  import os
                  import oracledb

                  db_user = os.getenv("DB_USER")
                  db_password = os.getenv("DB_PASSWORD")
                  db_dsn = os.getenv("DB_DSN")

                  conn = oracledb.connect(user=db_user, password=db_password, dsn=db_dsn)
                  cursor = conn.cursor()

                  try:
                      cursor.execute("""
                          CREATE TABLE transactions (
                              id             NUMBER GENERATED ALWAYS AS IDENTITY PRIMARY KEY,
                              transaction_id VARCHAR2(100) NOT NULL,
                              source_account VARCHAR2(100) NOT NULL,
                              target_account VARCHAR2(100) NOT NULL,
                              amount         NUMBER(12,2)  NOT NULL,
                              currency       VARCHAR2(10)  NOT NULL,
                              txn_type       VARCHAR2(50)  NOT NULL,
                              status         VARCHAR2(20)  NOT NULL,
                              created_at     TIMESTAMP WITH TIME ZONE DEFAULT SYSTIMESTAMP
                          )
                      """)
                      conn.commit()
                      print("Table 'transactions' created successfully")
                  except oracledb.DatabaseError as e:
                      error = e.args[0]
                      if error.code == 955:
                          print("Table 'transactions' already exists - skipping")
                      else:
                          raise

                  indexes = [
                      ("idx_txn_created_at", "CREATE INDEX idx_txn_created_at ON transactions (created_at DESC)"),
                      ("idx_txn_status_date", "CREATE INDEX idx_txn_status_date ON transactions (status, created_at DESC)"),
                      ("idx_txn_amount", "CREATE INDEX idx_txn_amount ON transactions (amount)"),
                  ]
                  for idx_name, ddl in indexes:
                      try:
                          cursor.execute(ddl)
                          conn.commit()
                          print(f"Index '{idx_name}' created successfully")
                      except oracledb.DatabaseError as e:
                          error = e.args[0]
                          if error.code == 955:
                              print(f"Index '{idx_name}' already exists - skipping")
                          else:
                              raise

                  cursor.close()
                  conn.close()
                  PYEOF
              env:
                - name: DB_USER
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "kafka-lab.consumerSecretName" . }}
                      key: DB_USER
                - name: DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "kafka-lab.consumerSecretName" . }}
                      key: DB_PASSWORD
                - name: DB_DSN
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "kafka-lab.consumerSecretName" . }}
                      key: DB_DSN
                - name: PYTHONUSERBASE
                  value: "/.local"
          volumes:
            - name: tmp
              emptyDir: {}
            - name: pip-cache
              emptyDir: {}
{{- end }}
