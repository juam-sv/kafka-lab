{{- if and .Values.jobs.enabled .Values.jobs.createTopic.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "kafka-lab.fullname" . }}-create-topic
  labels:
    {{- include "kafka-lab.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.jobs.createTopic.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: {{ .Values.jobs.ttlSecondsAfterFinished }}
      backoffLimit: {{ .Values.jobs.createTopic.backoffLimit }}
      template:
        spec:
          serviceAccountName: {{ .Values.producer.serviceAccount.name | default "producer" }}
          restartPolicy: OnFailure
          containers:
            - name: create-topic
              image: {{ .Values.image.registry }}:{{ .Values.producer.image.tag }}
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              command:
                - python
                - -c
                - |
                  import os
                  from aws_msk_iam_sasl_signer import MSKAuthTokenProvider
                  from confluent_kafka.admin import AdminClient, NewTopic
                  from confluent_kafka import KafkaException

                  AWS_REGION = os.getenv("AWS_REGION", "{{ .Values.region }}")
                  KAFKA_BROKER = os.getenv("KAFKA_BROKER")

                  def oauth_cb(config):
                      token, expiry_ms = MSKAuthTokenProvider.generate_auth_token(AWS_REGION)
                      return token, expiry_ms / 1000

                  admin = AdminClient({
                      "bootstrap.servers": KAFKA_BROKER,
                      "security.protocol": "SASL_SSL",
                      "sasl.mechanism": "OAUTHBEARER",
                      "oauth_cb": oauth_cb,
                  })

                  topic_name = "{{ .Values.kafka.topic }}"

                  # Check if topic already exists
                  metadata = admin.list_topics(timeout=10)
                  if topic_name in metadata.topics:
                      print(f"Topic '{topic_name}' already exists - skipping")
                  else:
                      fs = admin.create_topics([NewTopic(topic_name, num_partitions={{ .Values.kafka.partitions }}, replication_factor={{ .Values.kafka.replicationFactor }})])
                      for topic, f in fs.items():
                          try:
                              f.result()
                              print(f"Topic '{topic}' created successfully")
                          except KafkaException as e:
                              if e.args[0].code().name() == "TOPIC_ALREADY_EXISTS":
                                  print(f"Topic '{topic}' already exists - skipping")
                              else:
                                  raise
              env:
                - name: KAFKA_BROKER
                  value: {{ .Values.kafka.brokers | quote }}
                - name: AWS_REGION
                  value: {{ .Values.region | quote }}
{{- end }}
