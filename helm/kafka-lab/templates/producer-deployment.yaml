apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kafka-lab.fullname" . }}-producer
  labels:
    {{- include "kafka-lab.labels" . | nindent 4 }}
    app.kubernetes.io/component: producer
spec:
  replicas: {{ .Values.producer.replicas }}
  selector:
    matchLabels:
      {{- include "kafka-lab.selectorLabels" (dict "context" . "component" "producer") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kafka-lab.selectorLabels" (dict "context" . "component" "producer") | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.producer.serviceAccount.roleName }}
      containers:
        - name: producer
          image: {{ .Values.image.registry }}:{{ .Values.producer.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python", "producer.py"]
          env:
            - name: KAFKA_BROKER
              valueFrom:
                configMapKeyRef:
                  name: {{ include "kafka-lab.configmapName" . }}
                  key: KAFKA_BROKER
            - name: KAFKA_USE_MSK
              valueFrom:
                configMapKeyRef:
                  name: {{ include "kafka-lab.configmapName" . }}
                  key: KAFKA_USE_MSK
            - name: AWS_REGION
              valueFrom:
                configMapKeyRef:
                  name: {{ include "kafka-lab.configmapName" . }}
                  key: AWS_REGION
            - name: MSG_PER_SEC
              value: {{ .Values.producer.msgPerSec | quote }}
          resources:
            {{- toYaml .Values.producer.resources | nindent 12 }}
