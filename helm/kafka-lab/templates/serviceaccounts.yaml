{{- $root := . }}
{{- $components := list "producer" "consumer" "api" "frontend" }}
{{- range $i, $name := $components }}
{{- $config := index $root.Values $name }}
{{- if $i }}
---
{{- end }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $config.serviceAccount.name | default $name }}
  labels:
    {{- include "kafka-lab.labels" $root | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
  annotations:
    eks.amazonaws.com/role-arn: {{ include "kafka-lab.irsaArn" (dict "accountId" $root.Values.aws.accountId "roleName" $config.serviceAccount.roleName) }}
{{- end }}
