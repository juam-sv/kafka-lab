{{- if .Values.consumer.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kafka-lab.fullname" . }}-consumer
  labels:
    {{- include "kafka-lab.labels" . | nindent 4 }}
    app.kubernetes.io/component: consumer
spec:
  {{- if not .Values.keda.enabled }}
  replicas: {{ .Values.consumer.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "kafka-lab.selectorLabels" (dict "context" . "component" "consumer") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kafka-lab.selectorLabels" (dict "context" . "component" "consumer") | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.consumer.serviceAccount.name | default "consumer" }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: consumer
          image: {{ .Values.consumer.image.repository }}:{{ .Values.consumer.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          command: ["python", "consumer.py"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          env:
            - name: KAFKA_BROKER
              valueFrom:
                secretKeyRef:
                  name: {{ include "kafka-lab.consumerSecretName" . }}
                  key: KAFKA_BROKER
            - name: KAFKA_USE_MSK
              valueFrom:
                configMapKeyRef:
                  name: {{ include "kafka-lab.configmapName" . }}
                  key: KAFKA_USE_MSK
            - name: AWS_REGION
              valueFrom:
                configMapKeyRef:
                  name: {{ include "kafka-lab.configmapName" . }}
                  key: AWS_REGION
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "kafka-lab.consumerSecretName" . }}
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "kafka-lab.consumerSecretName" . }}
                  key: DB_PASSWORD
            - name: DB_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ include "kafka-lab.consumerSecretName" . }}
                  key: DB_WRITER_DSN
            - name: CONSUMER_GROUP
              value: {{ .Values.consumer.consumerGroup | default .Values.keda.kafka.consumerGroup | quote }}
            - name: MAX_MSG_PER_SEC
              value: {{ .Values.consumer.maxMsgPerSec | default 0 | quote }}
            {{- if .Values.otel.enabled }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "kafka-lab.configmapName" . }}
                  key: OTEL_EXPORTER_OTLP_ENDPOINT
            - name: OTEL_EXPORTER_OTLP_INSECURE
              valueFrom:
                configMapKeyRef:
                  name: {{ include "kafka-lab.configmapName" . }}
                  key: OTEL_EXPORTER_OTLP_INSECURE
            - name: OTEL_DEPLOYMENT_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "kafka-lab.configmapName" . }}
                  key: OTEL_DEPLOYMENT_ENVIRONMENT
            {{- end }}
          startupProbe:
            exec:
              command: ["find", "/tmp/healthy", "-mmin", "-1"]
            initialDelaySeconds: {{ .Values.consumer.startupProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.consumer.startupProbe.periodSeconds }}
            failureThreshold: {{ .Values.consumer.startupProbe.failureThreshold }}
          livenessProbe:
            exec:
              command: ["find", "/tmp/healthy", "-mmin", "-1"]
            initialDelaySeconds: {{ .Values.consumer.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.consumer.livenessProbe.periodSeconds }}
            failureThreshold: {{ .Values.consumer.livenessProbe.failureThreshold }}
          resources:
            {{- toYaml .Values.consumer.resources | nindent 12 }}
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
