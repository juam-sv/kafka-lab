{{- if .Values.api.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kafka-lab.fullname" . }}-api
  labels:
    {{- include "kafka-lab.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      {{- include "kafka-lab.selectorLabels" (dict "context" . "component" "api") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kafka-lab.selectorLabels" (dict "context" . "component" "api") | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.api.serviceAccount.name | default "api" }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 100
        runAsGroup: 100
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: {{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: {{ .Values.api.port }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          env:
            - name: KAFKA_BROKER
              valueFrom:
                secretKeyRef:
                  name: {{ include "kafka-lab.apiSecretsName" . }}
                  key: KAFKA_BROKER
            - name: KAFKA_USE_MSK
              valueFrom:
                configMapKeyRef:
                  name: {{ include "kafka-lab.configmapName" . }}
                  key: KAFKA_USE_MSK
            - name: AWS_REGION
              valueFrom:
                configMapKeyRef:
                  name: {{ include "kafka-lab.configmapName" . }}
                  key: AWS_REGION
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "kafka-lab.apiSecretsName" . }}
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "kafka-lab.apiSecretsName" . }}
                  key: DB_PASSWORD
            - name: DB_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ include "kafka-lab.apiSecretsName" . }}
                  key: DB_READER_DSN
            - name: CACHE_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ include "kafka-lab.apiSecretsName" . }}
                  key: CACHE_HOST
            - name: CACHE_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ include "kafka-lab.apiSecretsName" . }}
                  key: CACHE_PORT
            - name: CACHE_TLS
              valueFrom:
                secretKeyRef:
                  name: {{ include "kafka-lab.apiSecretsName" . }}
                  key: CACHE_TLS
            - name: CACHE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "kafka-lab.apiSecretsName" . }}
                  key: CACHE_PASSWORD
                  optional: true
            - name: CACHE_TTL
              value: {{ .Values.cache.ttl | quote }}
            - name: CACHE_COUNT_TTL
              value: {{ .Values.cache.countTtl | quote }}
            {{- if .Values.otel.enabled }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "kafka-lab.configmapName" . }}
                  key: OTEL_EXPORTER_OTLP_ENDPOINT
            - name: OTEL_EXPORTER_OTLP_INSECURE
              valueFrom:
                configMapKeyRef:
                  name: {{ include "kafka-lab.configmapName" . }}
                  key: OTEL_EXPORTER_OTLP_INSECURE
            - name: OTEL_DEPLOYMENT_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "kafka-lab.configmapName" . }}
                  key: OTEL_DEPLOYMENT_ENVIRONMENT
            {{- end }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          startupProbe:
            httpGet:
              path: {{ .Values.api.startupProbe.path }}
              port: {{ .Values.api.port }}
            initialDelaySeconds: {{ .Values.api.startupProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.api.startupProbe.periodSeconds }}
            failureThreshold: {{ .Values.api.startupProbe.failureThreshold }}
          livenessProbe:
            httpGet:
              path: {{ .Values.api.livenessProbe.path }}
              port: {{ .Values.api.port }}
            initialDelaySeconds: {{ .Values.api.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.api.livenessProbe.periodSeconds }}
            failureThreshold: {{ .Values.api.livenessProbe.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.api.readinessProbe.path }}
              port: {{ .Values.api.port }}
            initialDelaySeconds: {{ .Values.api.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.api.readinessProbe.periodSeconds }}
            failureThreshold: {{ .Values.api.readinessProbe.failureThreshold }}
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
