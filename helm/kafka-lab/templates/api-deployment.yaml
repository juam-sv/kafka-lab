{{- if .Values.api.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kafka-lab.fullname" . }}-api
  labels:
    {{- include "kafka-lab.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      {{- include "kafka-lab.selectorLabels" (dict "context" . "component" "api") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kafka-lab.selectorLabels" (dict "context" . "component" "api") | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.api.serviceAccount.name | default "api" }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 100
        runAsGroup: 100
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: {{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: {{ .Values.api.port }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "kafka-lab.apiSecretsName" . }}
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "kafka-lab.apiSecretsName" . }}
                  key: DB_PASSWORD
            - name: DB_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ include "kafka-lab.apiSecretsName" . }}
                  key: DB_READER_DSN
            - name: CACHE_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ include "kafka-lab.apiSecretsName" . }}
                  key: CACHE_HOST
            - name: CACHE_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ include "kafka-lab.apiSecretsName" . }}
                  key: CACHE_PORT
            - name: CACHE_TLS
              valueFrom:
                secretKeyRef:
                  name: {{ include "kafka-lab.apiSecretsName" . }}
                  key: CACHE_TLS
            - name: CACHE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "kafka-lab.apiSecretsName" . }}
                  key: CACHE_PASSWORD
                  optional: true
            - name: CACHE_TTL
              value: {{ .Values.cache.ttl | quote }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: {{ .Values.api.readinessProbe.path }}
              port: {{ .Values.api.port }}
            initialDelaySeconds: {{ .Values.api.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.api.readinessProbe.periodSeconds }}
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
