{{- if and .Values.keda.enabled .Values.failoverConsumer.enabled }}
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: {{ include "kafka-lab.fullname" . }}-failover-consumer-scaler
  labels:
    {{- include "kafka-lab.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    name: {{ include "kafka-lab.fullname" . }}-failover-consumer
  minReplicaCount: {{ .Values.failoverConsumer.keda.minReplicas }}
  maxReplicaCount: {{ .Values.failoverConsumer.keda.maxReplicas }}
  cooldownPeriod: {{ .Values.failoverConsumer.keda.cooldownPeriod }}
  triggers:
    - type: apache-kafka
      metadata:
        bootstrapServers: {{ .Values.kafka.brokers | quote }}
        consumerGroup: {{ .Values.failoverConsumer.peerConsumerGroup }}
        topic: {{ .Values.kafka.topic }}
        lagThreshold: {{ .Values.failoverConsumer.keda.lagThreshold | quote }}
        offsetResetPolicy: {{ .Values.keda.kafka.offsetResetPolicy }}
        sasl: aws_msk_iam
        tls: enable
        awsRegion: {{ .Values.region }}
        awsRoleArn: {{ include "kafka-lab.irsaArn" (dict "accountId" .Values.aws.accountId "roleName" .Values.consumer.serviceAccount.roleName) }}
      authenticationRef:
        name: {{ include "kafka-lab.fullname" . }}-msk-trigger-auth
{{- end }}
