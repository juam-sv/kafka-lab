region: us-east-1

aws:
  accountId: "123456789"

image:
  pullPolicy: IfNotPresent

externalSecrets:
  enabled: false
  refreshInterval: 1h

kafka:
  brokers: ""
  useMsk: true
  topic: financial.transactions
  partitions: 3
  replicationFactor: 3

database:
  user: admin
  password: ""
  dsn: ""
  # Multi-region: separate DSN for writes (consumer) and reads (API)
  # If not set, both default to the value of 'dsn'
  writerDsn: ""
  readerDsn: ""

cache:
  host: ""
  port: "6379"
  tls: false
  password: ""
  ttl: 120
  countTtl: 300

producer:
  enabled: true
  secretPath: ""
  image:
    repository: 123456789.dkr.ecr.us-east-1.amazonaws.com/producer
    tag: latest
  replicas: 1
  msgPerSec: 5
  useMessageKey: false
  serviceAccount:
    roleName: producer
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 128Mi
  livenessProbe:
    initialDelaySeconds: 10
    periodSeconds: 15
    failureThreshold: 3
  startupProbe:
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 10

consumer:
  enabled: true
  secretPath: ""
  image:
    repository: 123456789.dkr.ecr.us-east-1.amazonaws.com/consumer
    tag: latest
  replicas: 1
  consumerGroup: ""        # Empty = use keda.kafka.consumerGroup as fallback
  maxMsgPerSec: 0          # 0 = unlimited, >0 = rate limit per pod
  serviceAccount:
    roleName: consumer
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  livenessProbe:
    initialDelaySeconds: 15
    periodSeconds: 15
    failureThreshold: 3
  startupProbe:
    initialDelaySeconds: 10
    periodSeconds: 5
    failureThreshold: 10

failoverConsumer:
  enabled: false               # Enable per-region to activate automatic failover
  peerConsumerGroup: ""        # The OTHER region's consumer group (e.g., finance-group-use1)
  maxMsgPerSec: 0              # Rate limit (0 = unlimited)
  keda:
    minReplicas: 0             # Dormant — KEDA scales from 0 when peer lag grows
    maxReplicas: 5
    cooldownPeriod: 120        # Longer than primary to avoid flapping during recovery
    lagThreshold: "50"         # Higher than primary — only wake on sustained outage

api:
  enabled: true
  secretPath: ""
  image:
    repository: 123456789.dkr.ecr.us-east-1.amazonaws.com/api
    tag: latest
  replicas: 1
  port: 8000
  serviceAccount:
    roleName: api
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  livenessProbe:
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 15
    failureThreshold: 3
  readinessProbe:
    path: /ready
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 3
  startupProbe:
    path: /health
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 10
  service:
    type: ClusterIP

frontend:
  enabled: true
  image:
    repository: 123456789.dkr.ecr.us-east-1.amazonaws.com/frontend
    tag: latest
  replicas: 1
  port: 8080
  serviceAccount:
    roleName: frontend
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  livenessProbe:
    path: /healthz
    initialDelaySeconds: 5
    periodSeconds: 15
    failureThreshold: 3
  readinessProbe:
    path: /healthz
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 3
  service:
    type: ClusterIP

jobs:
  enabled: true
  ttlSecondsAfterFinished: 120
  createTopic:
    enabled: true
    schedule: "*/30 * * * *"
    backoffLimit: 3
  initOracle:
    enabled: true
    schedule: "*/30 * * * *"
    backoffLimit: 3

ingress:
  enabled: false
  hostname: "app.getorlo.info"
  regionalHostname: ""  # Per-region direct access (e.g., app-use1.getorlo.info)
  healthCheckId: ""  # Route53 health check ID (optional, created in Terraform)

keda:
  enabled: true
  minReplicas: 1
  maxReplicas: 10
  cooldownPeriod: 60
  kafka:
    consumerGroup: finance-group
    lagThreshold: "10"
    offsetResetPolicy: latest
