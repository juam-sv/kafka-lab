region: us-east-1

aws:
  accountId: "123456789"

image:
  pullPolicy: IfNotPresent

kafka:
  brokers: ""
  useMsk: true
  topic: financial.transactions
  partitions: 3
  replicationFactor: 3

database:
  user: admin
  password: ""
  dsn: ""
  # Multi-region: separate DSN for writes (consumer) and reads (API)
  # If not set, both default to the value of 'dsn'
  writerDsn: ""
  readerDsn: ""

cache:
  host: ""
  port: "6379"
  tls: false
  password: ""
  ttl: 120

producer:
  enabled: true
  image:
    repository: 123456789.dkr.ecr.us-east-1.amazonaws.com/producer
    tag: latest
  replicas: 1
  msgPerSec: 5
  serviceAccount:
    roleName: producer
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 128Mi

consumer:
  enabled: true
  image:
    repository: 123456789.dkr.ecr.us-east-1.amazonaws.com/consumer
    tag: latest
  replicas: 1
  serviceAccount:
    roleName: consumer
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

api:
  enabled: true
  image:
    repository: 123456789.dkr.ecr.us-east-1.amazonaws.com/api
    tag: latest
  replicas: 1
  port: 8000
  serviceAccount:
    roleName: api
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  readinessProbe:
    path: /docs
    initialDelaySeconds: 5
    periodSeconds: 10
  service:
    type: ClusterIP

frontend:
  enabled: true
  image:
    repository: 123456789.dkr.ecr.us-east-1.amazonaws.com/frontend
    tag: latest
  replicas: 1
  port: 8080
  serviceAccount:
    roleName: frontend
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  readinessProbe:
    path: /
    initialDelaySeconds: 5
    periodSeconds: 10
  service:
    type: ClusterIP

jobs:
  enabled: true
  ttlSecondsAfterFinished: 120
  createTopic:
    enabled: true
    schedule: "*/30 * * * *"
    backoffLimit: 3
  initOracle:
    enabled: true
    schedule: "*/30 * * * *"
    backoffLimit: 3

ingress:
  enabled: false
  hostname: "app.getorlo.info"
  healthCheckId: ""  # Route53 health check ID (optional, created in Terraform)

keda:
  enabled: true
  minReplicas: 1
  maxReplicas: 10
  cooldownPeriod: 60
  kafka:
    consumerGroup: finance-group
    lagThreshold: "10"
    offsetResetPolicy: latest
