# us-east-1 region overrides
# Usage: helm upgrade --install kafka-lab helm/kafka-lab/ -f helm/kafka-lab/env/values-us-east-1.yaml

region: us-east-1

aws:
  accountId: "729107656172"

externalSecrets:
  enabled: true
  refreshInterval: 1m

kafka:
  # Brokers kept for KEDA ScaledObject metadata (not injected into pods)
  brokers: "b-1.mskicpocuseast1.yb3d96.c17.kafka.us-east-1.amazonaws.com:9098,b-2.mskicpocuseast1.yb3d96.c17.kafka.us-east-1.amazonaws.com:9098,b-3.mskicpocuseast1.yb3d96.c17.kafka.us-east-1.amazonaws.com:9098"
  useMsk: true
  topic: financial.transactions
  partitions: 3
  replicationFactor: 3

cache:
  ttl: 120

producer:
  enabled: true
  secretPath: "/poc/eks/producer"
  image:
    repository: 729107656172.dkr.ecr.us-east-1.amazonaws.com/producer
    tag: "0.9.0"
  replicas: 1
  msgPerSec: 1
  serviceAccount:
    roleName: producer-use1
  resources:
    requests:
      cpu: 256m
      memory: 256Mi
    limits:
      cpu: 512m
      memory: 512Mi

consumer:
  enabled: false
  secretPath: "/poc/eks/consumer"
  image:
    repository: 729107656172.dkr.ecr.us-east-1.amazonaws.com/consumer
    tag: "0.9.0"
  replicas: 1
  consumerGroup: "finance-group-use1"
  maxMsgPerSec: 0
  serviceAccount:
    roleName: consumer-use1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

api:
  enabled: true
  secretPath: "/poc/eks/api"
  image:
    repository: 729107656172.dkr.ecr.us-east-1.amazonaws.com/api
    tag: "0.9.0"
  replicas: 1
  port: 8000
  serviceAccount:
    roleName: api-use1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  livenessProbe:
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 15
    failureThreshold: 3
  readinessProbe:
    path: /ready
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 3
  startupProbe:
    path: /health
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 10
  service:
    type: ClusterIP

frontend:
  enabled: true
  image:
    repository: 729107656172.dkr.ecr.us-east-1.amazonaws.com/frontend
    tag: "0.9.0"
  replicas: 1
  port: 8080
  serviceAccount:
    roleName: frontend-use1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  livenessProbe:
    path: /healthz
    initialDelaySeconds: 5
    periodSeconds: 15
    failureThreshold: 3
  readinessProbe:
    path: /healthz
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 3
  service:
    type: ClusterIP

jobs:
  enabled: true
  ttlSecondsAfterFinished: 120
  createTopic:
    enabled: true
    schedule: "*/3 * * * *"
    backoffLimit: 3
  initOracle:
    enabled: true
    schedule: "*/3 * * * *"
    backoffLimit: 3

ingress:
  enabled: true
  hostname: "app.getorlo.info"
  regionalHostname: "app-use1.getorlo.info"
  healthCheckId: ""  # TODO: populate after Terraform creates standalone health checks

failoverConsumer:
  enabled: false
  peerConsumerGroup: "finance-group-use2"

keda:
  enabled: true
  minReplicas: 1
  maxReplicas: 10
  cooldownPeriod: 60
  kafka:
    consumerGroup: finance-group
    lagThreshold: "10"
    offsetResetPolicy: latest
