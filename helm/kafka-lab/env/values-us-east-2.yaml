# us-east-2 region overrides
# Usage: helm upgrade --install kafka-lab helm/kafka-lab/ -f helm/kafka-lab/env/values-us-east-2.yaml

region: us-east-2

aws:
  accountId: "729107656172"

externalSecrets:
  enabled: true
  refreshInterval: 1h

kafka:
  # Brokers kept for KEDA ScaledObject metadata (not injected into pods)
  brokers: "b-1.mskicpocuseast1.9gfgq4.c17.kafka.us-east-1.amazonaws.com:9098,b-2.mskicpocuseast1.9gfgq4.c17.kafka.us-east-1.amazonaws.com:9098,b-3.mskicpocuseast1.9gfgq4.c17.kafka.us-east-1.amazonaws.com:9098"
  useMsk: true
  topic: financial.transactions
  partitions: 3
  replicationFactor: 3

cache:
  ttl: 120

# IRSA roles with -use2 suffix (IAM is global, names must be unique)
producer:
  enabled: true
  secretPath: "/poc/eks/producer"
  image:
    repository: 729107656172.dkr.ecr.us-east-2.amazonaws.com/producer
    tag: "0.4.2"
  replicas: 0
  msgPerSec: 1
  serviceAccount:
    roleName: producer-use2
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 128Mi

consumer:
  enabled: true
  secretPath: "/poc/eks/consumer"
  image:
    repository: 729107656172.dkr.ecr.us-east-2.amazonaws.com/consumer
    tag: "0.4.2"
  replicas: 0
  serviceAccount:
    roleName: consumer-use2
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

api:
  enabled: true
  secretPath: "/poc/eks/api"
  image:
    repository: 729107656172.dkr.ecr.us-east-2.amazonaws.com/api
    tag: "0.4.2"
  replicas: 1
  port: 8000
  serviceAccount:
    roleName: api-use2
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  readinessProbe:
    path: /docs
    initialDelaySeconds: 5
    periodSeconds: 10
  service:
    type: ClusterIP

frontend:
  enabled: true
  image:
    repository: 729107656172.dkr.ecr.us-east-2.amazonaws.com/frontend
    tag: "0.4.2"
  replicas: 1
  port: 8080
  serviceAccount:
    roleName: frontend-use2
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  readinessProbe:
    path: /
    initialDelaySeconds: 5
    periodSeconds: 10
  service:
    type: ClusterIP

jobs:
  enabled: true
  ttlSecondsAfterFinished: 120
  createTopic:
    enabled: true
    schedule: "*/30 * * * *"
    backoffLimit: 3
  initOracle:
    enabled: true
    schedule: "*/30 * * * *"
    backoffLimit: 3

ingress:
  enabled: true
  hostname: "app.getorlo.info"
  healthCheckId: ""  # TODO: populate after Terraform creates standalone health checks

keda:
  enabled: true
  minReplicas: 1
  maxReplicas: 10
  cooldownPeriod: 60
  kafka:
    consumerGroup: finance-group
    lagThreshold: "10"
    offsetResetPolicy: latest
