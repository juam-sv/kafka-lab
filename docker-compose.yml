services:
  broker:
    image: confluentinc/cp-kafka:7.8.0
    hostname: broker
    container_name: broker
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://broker:9092,PLAINTEXT_HOST://localhost:29092'
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@broker:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:29092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    healthcheck:
      test: ["CMD", "kafka-cluster", "cluster-id", "--bootstrap-server", "localhost:9092"]
      interval: 5s
      timeout: 10s
      retries: 5

  oracle:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle
    environment:
      ORACLE_PASSWORD: ${ORACLE_SYS_PASSWORD}
      APP_USER: ${DB_USER}
      APP_USER_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./init.sql:/container-entrypoint-initdb.d/init.sql
    ports:
      - "1521:1521"
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 30s

  control-center:
    image: confluentinc/cp-enterprise-control-center:7.8.0
    hostname: control-center
    container_name: control-center
    depends_on:
      broker:
        condition: service_healthy
    labels:
      - "dev.orbstack.domains=control-center.kafka-poc.orb.local"
    environment:
      CONTROL_CENTER_BOOTSTRAP_SERVERS: 'broker:9092'
      CONTROL_CENTER_REPLICATION_FACTOR: 1
      CONTROL_CENTER_INTERNAL_TOPICS_REPLICATION: 1
      CONTROL_CENTER_MONITORING_INTERCEPTOR_TOPIC_REPLICATION: 1
      CONFLUENT_METRICS_TOPIC_REPLICATION: 1
      PORT: 9021

  producer:
    build:
      context: ./app
      dockerfile: Dockerfile.producer
    container_name: producer
    environment:
      KAFKA_BROKER: ${KAFKA_BROKER}
      MSG_PER_SEC: ${MSG_PER_SEC}
      USE_MESSAGE_KEY: ${USE_MESSAGE_KEY:-false}
    depends_on:
      broker:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "find /tmp/healthy -mmin -1 | grep -q ."]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  consumer:
    build:
      context: ./app
      dockerfile: Dockerfile.consumer
    container_name: consumer
    environment:
      KAFKA_BROKER: ${KAFKA_BROKER}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DSN: ${DB_DSN}
      CONSUMER_GROUP: ${CONSUMER_GROUP:-finance-group}
      MAX_MSG_PER_SEC: ${MAX_MSG_PER_SEC:-0}
    depends_on:
      broker:
        condition: service_healthy
      oracle:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "find /tmp/healthy -mmin -1 | grep -q ."]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  valkey:
    image: valkey/valkey:8-alpine
    container_name: valkey
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./api
    container_name: api
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DSN: ${DB_DSN}
      CACHE_HOST: 'valkey'
      CACHE_TTL: ${CACHE_TTL:-120}
      KAFKA_BROKER: ${KAFKA_BROKER}
    depends_on:
      broker:
        condition: service_healthy
      oracle:
        condition: service_healthy
      valkey:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "8080:8080"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
