apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kafka-lab-us-east-2
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io/background
spec:
  project: default
  source:
    repoURL: https://github.com/juam-sv/kafka-lab
    targetRevision: HEAD
    path: helm/kafka-lab
    helm:
      valueFiles:
        - env/values-us-east-2.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - ApplyOutOfSyncOnly=true

